name: Release

# Publishes the gem to RubyGems.org via Trusted Publishing (OIDC) when a
# version tag is pushed. No API key is stored — GitHub Actions authenticates
# to RubyGems.org with a short-lived OIDC token.
#
# Prerequisites (one-time, manual):
#   1. Configure a Trusted Publisher for the `moult` gem on RubyGems.org
#      (repo: moult-rb/moult-rb, workflow: release.yml, environment: release).
#      https://guides.rubygems.org/trusted-publishing/
#   2. Create a `release` GitHub environment (Settings → Environments) and,
#      optionally, add a required-reviewer protection rule for an extra gate.
#
# To cut a release: bump lib/moult/version.rb, update CHANGELOG.md, commit,
# then `git tag v0.1.0 && git push origin v0.1.0`. After each release on the
# v1 line, re-point the floating major tag so `uses: moult-rb/moult-rb@v1`
# picks it up: `git tag -f v1 vX.Y.Z && git push -f origin v1`. Full-version
# tags (v0.x.y, v1.x.y) stay immutable; only the bare major tag moves.

on:
  push:
    tags:
      # Full semver tags only, so re-pointing the floating `v1` major tag
      # never triggers a gem publish. (Pre-release-suffixed tags like
      # v1.0.0-rc1 also won't trigger — cut releases with full versions.)
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write   # create the GitHub Release / push the tag commit
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Verify suite + lint
        run: bundle exec rake

      - name: Publish to RubyGems via Trusted Publishing
        uses: rubygems/release-gem@v1
